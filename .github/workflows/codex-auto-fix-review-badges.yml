name: Codex Auto-Fix Review Badges

on:
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-autofix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  codex-autofix:
    name: Run Codex on the tagged review finding
    runs-on: ubuntu-latest
    if: >
      (
        github.event.sender.login == 'chatgpt-codex-connector' ||
        github.event.sender.login == 'chatgpt-codex-connector[bot]'
      ) &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Detect P1/P2 badge and attempt cap
        id: detect
        uses: actions/github-script@v7
        env:
          MAX_CODEX_AUTOFIX_ATTEMPTS_PER_PR: "3"
        with:
          script: |
            const pr = context.payload.pull_request;
            const comment = context.payload.comment;
            const body = comment?.body || "";
            const hasP1OrP2 =
              /P1 Badge|badge\/P1|\bP1\b|P2 Badge|badge\/P2|\bP2\b/i.test(body);

            const markerPrefix = `<!-- codex-action-autofix:${pr.number}:`;
            const marker = `${markerPrefix}${comment.id}:${pr.head.sha} -->`;

            core.setOutput("marker", marker);
            core.setOutput("should_run", "false");

            if (!hasP1OrP2) {
              core.info("No P1/P2 badge found in Codex review comment.");
              return;
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            if (comments.some((existing) => existing.body?.includes(marker))) {
              core.info("Already ran Codex auto-fix for this review comment and PR head SHA.");
              return;
            }

            const attemptCount = comments.filter((existing) =>
              existing.body?.includes(markerPrefix)
            ).length;
            const maxAttempts = Number(process.env.MAX_CODEX_AUTOFIX_ATTEMPTS_PER_PR || "3");

            if (attemptCount >= maxAttempts) {
              core.info(`Reached Codex auto-fix attempt cap (${maxAttempts}) for this PR.`);
              return;
            }

            core.setOutput("should_run", "true");

      - name: Check out PR head branch
        if: steps.detect.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Ensure event still matches branch head
        id: head
        if: steps.detect.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          current_head="$(git rev-parse HEAD)"
          event_head="${{ github.event.pull_request.head.sha }}"
          if [ "$current_head" != "$event_head" ]; then
            echo "Branch moved after this review comment; skipping stale auto-fix."
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "up_to_date=true" >> "$GITHUB_OUTPUT"

      - name: Build scoped Codex prompt
        if: steps.detect.outputs.should_run == 'true' && steps.head.outputs.up_to_date == 'true'
        run: |
          node <<'NODE'
          const fs = require("fs");
          const payload = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const pr = payload.pull_request;
          const comment = payload.comment;

          const prompt = [
            `You are fixing exactly one Codex review finding on PR #${pr.number}.`,
            "",
            "Scope:",
            `- Repository: ${process.env.GITHUB_REPOSITORY}`,
            `- PR branch: ${pr.head.ref}`,
            `- Base branch: ${pr.base.ref}`,
            `- PR head SHA: ${pr.head.sha}`,
            `- Review comment ID: ${comment.id}`,
            `- Review comment URL: ${comment.html_url}`,
            `- Review file: ${comment.path || "unknown"}`,
            `- Review line: ${comment.line || comment.original_line || "unknown"}`,
            "",
            "Review comment to fix:",
            "```markdown",
            comment.body || "",
            "```",
            "",
            "Rules:",
            "- Fix only the issue described by the review comment above.",
            "- Do not address unrelated P1/P2 findings in this run.",
            "- Read AGENTS.md, STATUS.md, and the relevant implementation/verification docs before editing.",
            "- Keep the patch scoped to the current PR branch and current milestone only.",
            "- Do not start the next milestone.",
            "- Do not weaken safety gates, approval gates, feature gates, geoblock, heartbeat, readback, journal, reconciliation, risk, stale-data, kill-switch, or secret-handling behavior.",
            "- Do not add live trading behavior beyond what this PR already authorizes.",
            "- Do not print, commit, or infer secret values.",
            "- Preserve unrelated work.",
            "- Add or update focused regression tests for the fixed behavior.",
            "- If the review finding is incorrect, leave the code unchanged and explain why in your final message.",
            "",
            "Verification:",
            "- Run the narrow tests relevant to the changed code.",
            "- Run scripts/verify-pr.sh before finishing if feasible.",
            "- If STATUS.md or a dated verification note requires stricter phase-specific commands, run those too.",
            "",
            "Final response:",
            "- Summarize the exact finding addressed.",
            "- List files changed.",
            "- List tests/checks run.",
          ].join("\n");

          fs.writeFileSync(".codex-autofix-prompt.md", prompt);
          NODE

      - name: Check OpenAI API key secret
        if: steps.detect.outputs.should_run == 'true' && steps.head.outputs.up_to_date == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY repo secret is required for direct Codex auto-fix."
            exit 1
          fi

      - name: Run Codex auto-fix
        id: run_codex
        if: steps.detect.outputs.should_run == 'true' && steps.head.outputs.up_to_date == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .codex-autofix-prompt.md
          output-file: .codex-autofix-output.md
          model: gpt-5.5
          effort: high
          safety-strategy: drop-sudo
          sandbox: workspace-write
          allow-bots: chatgpt-codex-connector[bot]

      - name: Remove generated Codex files
        if: always()
        run: |
          rm -f .codex-autofix-prompt.md .codex-autofix-output.md

      - name: Detect Codex changes
        id: changes
        if: steps.detect.outputs.should_run == 'true' && steps.head.outputs.up_to_date == 'true'
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify changed PR branch
        if: steps.changes.outputs.has_changes == 'true'
        run: scripts/verify-pr.sh

      - name: Commit and push Codex fixes
        id: commit
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Codex autofix review comment"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Comment auto-fix result
        if: always() && steps.detect.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          MARKER: ${{ steps.detect.outputs.marker }}
          HEAD_UP_TO_DATE: ${{ steps.head.outputs.up_to_date }}
          HAS_CHANGES: ${{ steps.changes.outputs.has_changes }}
          PUSHED: ${{ steps.commit.outputs.pushed }}
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs['final-message'] }}
        with:
          script: |
            const marker = process.env.MARKER;
            const headUpToDate = process.env.HEAD_UP_TO_DATE;
            const hasChanges = process.env.HAS_CHANGES;
            const pushed = process.env.PUSHED;
            const finalMessage = process.env.CODEX_FINAL_MESSAGE || "";

            const status =
              headUpToDate === "false" ? "skipped because the PR branch moved after the review comment" :
              pushed === "true" ? "pushed a fix commit to this PR branch" :
              hasChanges === "false" ? "completed without file changes" :
              "did not complete successfully; inspect the workflow logs";

            const body = [
              marker,
              `Codex auto-fix ${status}.`,
              "",
              finalMessage ? "Codex summary:" : "",
              finalMessage ? finalMessage.slice(0, 5000) : "",
            ].filter(Boolean).join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
